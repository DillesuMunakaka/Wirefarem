<!doctype html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>My Account — Onefinity CNC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="assets/tailwind.config.js"></script>
  <link rel="stylesheet" href="assets/theme.css">
</head>
<body class="font-body text-ink bg-white antialiased min-h-screen flex flex-col">

  <div id="site-header"></div>

  <main class="flex-1">
    <div class="max-w-[1080px] mx-auto px-[22px] pt-10 pb-20"
         x-data="{ a: OF_DATA.account, get ptsPct(){ return Math.min(100, Math.round(this.a.points/this.a.nextTier*100)); }, initials(n){ return n.split(' ').map(x=>x[0]).join('').slice(0,2); } }">
      <div class="rounded-[24px] p-8 text-white flex items-center gap-5 flex-wrap mb-7" style="background:linear-gradient(135deg,#2F6949,#479D6E)">
        <div class="w-[74px] h-[74px] rounded-full bg-white/20 flex items-center justify-center text-[28px] font-extrabold shrink-0" x-text="initials(a.name)"></div>
        <div class="flex-1">
          <div class="text-sm opacity-85 font-semibold"><span x-text="a.tier"></span> member</div>
          <div class="font-head text-[28px] font-extrabold" x-text="a.name"></div>
          <div class="text-sm opacity-85" x-text="a.email"></div>
        </div>
        <div class="flex-1 min-w-[200px]">
          <div class="flex justify-between text-[13px] mb-2"><span><span x-text="a.points"></span> pts</span><span class="opacity-85" x-text="(a.nextTier-a.points)+' pts to Pro'"></span></div>
          <div class="h-2.5 rounded-full bg-white/25 overflow-hidden"><div class="h-full bg-gradient-to-r from-brand-green to-brand-dark rounded-full transition-[width] duration-500" :style="'width:'+ptsPct+'%'"></div></div>
        </div>
      </div>

      <div class="grid gap-5" style="grid-template-columns:repeat(auto-fit,minmax(300px,1fr))">
        <div class="bg-white border border-line rounded-[20px] p-6">
          <h3 class="font-head text-[20px] font-extrabold mb-4">Recent orders</h3>
          <template x-for="(o,i) in a.orders" :key="i">
            <div class="flex items-center justify-between gap-3 py-3 border-b border-line">
              <div><div class="font-bold text-[15px]" x-text="o.no"></div><div class="text-[13px] text-faint" x-text="o.date"></div></div>
              <div class="text-right"><div class="font-extrabold" x-text="o.total"></div><span class="text-xs font-bold" :style="'color:'+o.color" x-text="o.status"></span></div>
            </div>
          </template>
        </div>
        <div class="bg-white border border-line rounded-[20px] p-6">
          <h3 class="font-head text-[20px] font-extrabold mb-4">Saved builds</h3>
          <template x-for="(b,i) in a.builds" :key="i">
            <div class="flex items-center justify-between gap-3 py-3 border-b border-line">
              <div><div class="font-bold text-[15px]" x-text="b.name"></div><div class="text-[13px] text-faint" x-text="b.date"></div></div>
              <div class="flex items-center gap-3"><span class="font-extrabold" x-text="b.total"></span><a href="build.html" class="bg-brand-mint2 text-brand-dark font-bold text-[13px] px-3 py-1.5 rounded-[9px]">Edit</a></div>
            </div>
          </template>
          <a href="build.html" class="block text-center w-full mt-4 border-[1.5px] border-brand-green text-brand-dark font-bold text-[15px] py-3 rounded-xl">+ Start a new build</a>
        </div>
      </div>
    </div>
  </main>

  <div id="site-footer"></div>

  <script src="assets/data.js"></script>
  <script src="assets/theme.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</body>
</html>
