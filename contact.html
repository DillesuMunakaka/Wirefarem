<!doctype html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact Us — Onefinity CNC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="assets/tailwind.config.js"></script>
  <link rel="stylesheet" href="assets/theme.css">
</head>
<body class="font-body text-ink bg-white antialiased min-h-screen flex flex-col">

  <div id="site-header"></div>

  <main class="flex-1">
    <div id="page-hero"
         data-eyebrow="We're here to help"
         data-title="Contact Us"
         data-sub="Questions about a machine, an order or support? Send us a note — our North American team replies fast."></div>

    <div class="shell py-16 lg:py-20">
      <div class="grid lg:grid-cols-[1fr_340px] gap-8 items-start reveal">
        <form @submit.prevent="$store.shop.pushToast('Message sent','We\'ll get back to you shortly')" class="bg-white border border-line rounded-[20px] p-6 flex flex-col gap-3.5">
          <div class="flex gap-3 flex-wrap"><input required placeholder="First name" class="border-[1.5px] border-line2 rounded-[11px] px-3.5 py-3 text-[15px] outline-none flex-1 min-w-[140px]"><input required placeholder="Last name" class="border-[1.5px] border-line2 rounded-[11px] px-3.5 py-3 text-[15px] outline-none flex-1 min-w-[140px]"></div>
          <input type="email" required placeholder="Email address" class="border-[1.5px] border-line2 rounded-[11px] px-3.5 py-3 text-[15px] outline-none w-full">
          <select class="border-[1.5px] border-line2 rounded-[11px] px-3.5 py-3 text-[15px] bg-white outline-none w-full">
            <option>Sales question</option><option>Order &amp; shipping</option><option>Technical support</option><option>Warranty claim</option><option>Something else</option>
          </select>
          <textarea required rows="5" placeholder="How can we help?" class="border-[1.5px] border-line2 rounded-[11px] px-3.5 py-3 text-[15px] outline-none w-full resize-y"></textarea>
          <button type="submit" class="bg-brand-green text-white font-bold text-base py-3.5 rounded-xl hover:bg-brand-dark transition-colors">Send message</button>
        </form>

        <div class="flex flex-col gap-4">
          <div class="bg-brand-wash rounded-[18px] p-5"><div class="font-head text-[17px] font-extrabold mb-1">Email</div><a href="mailto:support@onefinitycnc.com" class="text-brand-dark font-semibold">support@onefinitycnc.com</a></div>
          <div class="bg-brand-wash rounded-[18px] p-5"><div class="font-head text-[17px] font-extrabold mb-1">Phone</div><div class="text-muted">Mon–Fri · 9am–5pm ET</div><div class="text-brand-dark font-semibold">1-800-000-0000</div></div>
          <div class="bg-brand-wash rounded-[18px] p-5"><div class="font-head text-[17px] font-extrabold mb-1">Looking for answers?</div><p class="text-sm text-muted mb-2">Most questions are covered in our FAQ and manuals.</p><a href="faq.html" class="text-brand-dark font-bold text-sm">Visit the FAQ →</a></div>
        </div>
      </div>
    </div>
  </main>

  <div id="site-footer"></div>

  <script src="assets/data.js"></script>
  <script src="assets/theme.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</body>
</html>
