<!doctype html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Your Cart — Onefinity CNC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="assets/tailwind.config.js"></script>
  <link rel="stylesheet" href="assets/theme.css">
</head>
<body class="font-body text-ink bg-white antialiased min-h-screen flex flex-col">

  <div id="site-header"></div>

  <main class="flex-1">
    <div class="max-w-[1180px] mx-auto px-[22px] pt-10 pb-20"
         x-data="{
           upsell: OF_DATA.accessories.slice(0,3),
           get sub(){ return $store.shop.subtotal; },
           get shipping(){ return (this.sub>=75 || this.sub===0) ? 0 : 49; },
           get grand(){ return this.sub + this.shipping; }
         }">
      <h1 class="font-head text-[clamp(34px,5vw,55px)] font-extrabold mb-6">Your Cart</h1>

      <!-- empty -->
      <div x-show="!$store.shop.cart.length" class="text-center py-[70px] px-5 bg-brand-wash2 rounded-[22px]">
        <div class="text-[24px] font-extrabold mb-2.5">Your cart is empty</div>
        <p class="text-[17px] text-muted mb-6">Start with a machine or build your own.</p>
        <div class="flex gap-3 justify-center flex-wrap">
          <a href="build.html" class="bg-brand-green text-white font-bold text-base px-6 py-3.5 rounded-xl">Build Your CNC</a>
          <a href="collection.html" class="border-[1.5px] border-line2 font-bold text-base px-6 py-3.5 rounded-xl">Shop Machines</a>
        </div>
      </div>

      <!-- items -->
      <div x-show="$store.shop.cart.length" class="flex flex-col lg:grid lg:grid-cols-[1fr_380px] gap-6 lg:gap-8 lg:items-start">
        <div>
          <div class="bg-brand-mint2 rounded-[14px] px-4 py-3.5 mb-4">
            <div class="text-sm font-bold text-brand-dark mb-2" x-text="$store.shop.freeShipMsg"></div>
            <div class="h-2 rounded-full bg-white overflow-hidden"><div class="h-full bg-gradient-to-r from-brand-green to-brand-dark rounded-full transition-[width] duration-500" :style="'width:'+$store.shop.freeShipPct+'%'"></div></div>
          </div>
          <div class="bg-white border border-line rounded-[18px] overflow-hidden">
            <template x-for="it in $store.shop.cart" :key="it.id">
              <div class="flex gap-4 p-4 border-b border-line">
                <div class="w-[88px] h-[88px] rounded-[14px] border border-line flex items-center justify-center shrink-0 overflow-hidden" :class="it.custom ? 'bg-brand-mint2' : 'bg-brand-wash'"><img :src="it.img" :alt="it.name" class="w-full h-full object-contain p-2" loading="lazy"></div>
                <div class="flex-1 min-w-0">
                  <div class="font-bold text-[17px]" x-text="it.name"></div>
                  <div class="text-[13.5px] text-faint mt-0.5 mb-3" x-text="it.sub||'Onefinity'"></div>
                  <div class="flex items-center gap-3.5 flex-wrap">
                    <div class="flex items-center border-[1.5px] border-line2 rounded-[10px] overflow-hidden">
                      <button @click="$store.shop.changeQty(it.id,-1)" class="w-[34px] h-[34px] text-muted text-[18px]">−</button>
                      <span class="w-8 text-center font-bold" x-text="it.qty"></span>
                      <button @click="$store.shop.changeQty(it.id,1)" class="w-[34px] h-[34px] text-muted text-[17px]">+</button>
                    </div>
                    <button @click="$store.shop.remove(it.id)" class="text-faint text-[13.5px] font-semibold hover:text-[#C0392B] transition-colors">Remove</button>
                  </div>
                </div>
                <div class="text-[19px] font-extrabold whitespace-nowrap" x-text="$store.shop.money(it.price*it.qty)"></div>
              </div>
            </template>
          </div>

          <div class="mt-6">
            <h3 class="font-head text-[19px] font-extrabold mb-3.5">You might also like</h3>
            <div class="grid gap-3.5" style="grid-template-columns:repeat(auto-fill,minmax(180px,1fr))">
              <template x-for="u in upsell" :key="u.id">
                <div class="bg-white border border-line rounded-[16px] p-3.5 flex flex-col gap-2.5">
                  <div class="aspect-square bg-slate2 rounded-[11px] flex items-center justify-center"><img :src="u.img" :alt="u.name" class="w-full h-full object-contain p-3.5" loading="lazy"></div>
                  <div class="text-sm font-bold leading-tight" x-text="u.name"></div>
                  <div class="flex items-center justify-between"><span class="font-extrabold" x-text="$store.shop.money(u.price)"></span><button @click="$store.shop.add({id:u.id,name:u.name,price:u.price,img:u.img,sub:'Accessory'},false)" class="bg-brand-mint2 text-brand-dark font-bold text-[13px] px-3 py-1.5 rounded-[9px]">Add</button></div>
                </div>
              </template>
            </div>
          </div>
        </div>

        <div class="lg:sticky lg:top-[160px] bg-white border border-line rounded-[20px] p-6">
          <h3 class="font-head text-[20px] font-extrabold mb-4">Order summary</h3>
          <div class="flex justify-between text-[15px] py-2"><span class="text-muted">Subtotal</span><span class="font-bold" x-text="$store.shop.money(sub)"></span></div>
          <div class="flex justify-between text-[15px] py-2"><span class="text-muted">Shipping</span><span class="font-bold" x-text="sub===0 ? '—' : (shipping===0 ? 'Free' : $store.shop.money(shipping))"></span></div>
          <div class="flex justify-between text-[20px] py-3.5 mt-1.5 border-t border-line"><span class="font-bold">Total</span><span class="font-extrabold text-brand-dark" x-text="$store.shop.money(grand)"></span></div>
          <a href="checkout.html" class="block text-center w-full bg-brand-green text-white text-[17px] font-bold py-4 rounded-[13px] mt-2.5 hover:bg-brand-dark transition-colors">Checkout</a>
          <div class="flex items-center justify-center gap-1.5 mt-3.5 text-faint text-[13px]"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#479D6E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>Secure checkout · 30-day returns</div>
        </div>
      </div>
    </div>
  </main>

  <div id="site-footer"></div>

  <script src="assets/data.js"></script>
  <script src="assets/theme.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</body>
</html>
